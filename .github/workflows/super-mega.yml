name: Auto-Build Super Mega IPTV Playlist

on:
  schedule:
    - cron: "0 */6 * * *"   # Run every 6 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      ##############################
      # STEP 1 — CHECKOUT
      ##############################
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      ##############################
      # STEP 2 — DEFINE CLEAN FUNCTION
      ##############################
      - name: Define cleaning function
        run: |
          cat << 'EOF' > clean.sh
          #!/bin/bash
          infile="$1"
          outfile="$2"

          # Extract all EXTINF lines paired with URLs
          paste -d'\n' <(grep -E "^#EXTINF" "$infile") <(grep -v "^#" "$infile" | grep -E "\.m3u8|http") > temp_pairs.txt

          # Remove duplicates by channel name (2B)
          # Extract channel name from the EXTINF line (after last comma)
          awk -v FS="," '
            NR%2==1 { 
              name=$NF; gsub(/^[ \t]+|[ \t]+$/, "", name)
              extinf=$0
              getline url
              if (!seen[name]++) {
                print extinf >> "pairs_cleaned.txt"
                print url >> "pairs_cleaned.txt"
              }
            }
          ' temp_pairs.txt

          # Sort alphabetically by channel name (1A)
          awk 'NR%2==1 {name=$0; getline url; print name"::"url}' pairs_cleaned.txt \
            | sort -f \
            | awk -F"::" '{print $1"\n"$2}' > sorted.txt

          # Rebuild final M3U
          {
            echo "#EXTM3U"
            cat sorted.txt
          } > "$outfile"

          rm -f temp_pairs.txt pairs_cleaned.txt sorted.txt
          EOF

          chmod +x clean.sh

      ##############################
      # STEP 3 — BUILD RAW PLAYLISTS
      ##############################
      - name: Build Raw Playlists
        run: |
          mkdir -p countries languages categories

          echo '#EXTM3U url-tvg="https://iptv-org.github.io/epg/guides.xml"' > mega_raw.m3u

          ##############################################################
          # COUNTRIES (India / Bangladesh / Pakistan / USA / UK / Spain)
          # Source: iptv-org country playlists  [1](https://www.jiotv.com/)
          ##############################################################
          declare -A country_map=(
            ["india"]="in"
            ["bangladesh"]="bd"
            ["pakistan"]="pk"
            ["usa"]="us"
            ["uk"]="gb"
            ["spain"]="es"
          )

          for country in "${!country_map[@]}"; do
            code="${country_map[$country]}"
            echo "#EXTM3U" > countries/${country}.raw.m3u
            curl -s "https://iptv-org.github.io/iptv/countries/${code}.m3u" >> countries/${country}.raw.m3u
            cat countries/${country}.raw.m3u >> mega_raw.m3u
          done

          ##############################################################
          # LANGUAGES (English / Hindi / Bengali / Urdu)
          # Source: iptv-org language playlists  [3](https://apps.apple.com/in/app/jiotv/id6467191146)
          ##############################################################
          declare -A lang_map=(
            ["english"]="eng"
            ["hindi"]="hin"
            ["bengali"]="ben"
            ["urdu"]="urd"
          )

          for lang in "${!lang_map[@]}"; do
            code="${lang_map[$lang]}"
            echo "#EXTM3U" > languages/${lang}.raw.m3u
            curl -s "https://iptv-org.github.io/iptv/languages/${code}.m3u" >> languages/${lang}.raw.m3u
            cat languages/${lang}.raw.m3u >> mega_raw.m3u
          done

          ##############################################################
          # CATEGORIES (Sports / Movies / Kids / Music / News)
          # Source: iptv-org category playlists  [2](https://renkz.com/free-m3u-playlists/)
          ##############################################################
          categories=(sports movies kids music news)

          for cat in "${categories[@]}"; do
            echo "#EXTM3U" > categories/${cat}.raw.m3u
            curl -s "https://iptv-org.github.io/iptv/categories/${cat}.m3u" >> categories/${cat}.raw.m3u
            cat categories/${cat}.raw.m3u >> mega_raw.m3u
          done

          ##############################################################
          # GLOBAL MASTER (~8000 channels)
          # Source: iptv-org index.m3u  [4](https://blog.rdphostings.com/iptv-github-playlist)
          ##############################################################
          curl -s https://iptv-org.github.io/iptv/index.m3u >> mega_raw.m3u

      ##############################
      # STEP 4 — CLEAN + SORT + DEDUPE + LOGOS
      ##############################
      - name: Clean All Playlists
        run: |
          # Clean countries
          for f in countries/*.raw.m3u; do
            out="${f/.raw/}"
            ./clean.sh "$f" "$out"
          done

          # Clean languages
          for f in languages/*.raw.m3u; do
            out="${f/.raw/}"
            ./clean.sh "$f" "$out"
          done

          # Clean categories
          for f in categories/*.raw.m3u; do
            out="${f/.raw/}"
            ./clean.sh "$f" "$out"
          done

          # Clean mega
          ./clean.sh mega_raw.m3u mega.m3u

          # Remove raw files
          rm -f countries/*.raw.m3u languages/*.raw.m3u categories/*.raw.m3u mega_raw.m3u

      ##############################
      # STEP 5 — COMMIT & PUSH USING PAT
      ##############################
      - name: Commit and Push Changes (PAT)
        env:
          TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          git config --global user.name "AutoBot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "Cleaned + Sorted + Deduped IPTV playlists" || echo "No changes"
          git remote set-url origin https://sarfaraj74-Tech:${TOKEN}@github.com/${REPO}.git
          git push origin HEAD:${BRANCH}
