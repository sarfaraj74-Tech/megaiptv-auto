name: Auto-Build Mega Playlist (Category Mapped)

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout without persisting the default token
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # 2) Build mega.m3u grouped by Category using category playlists (C1 full set)
      - name: Build Mega Playlist
        run: |
          set -euo pipefail

          work=tmp_cat
          rm -rf "$work" || true
          mkdir -p "$work"

          # ---- Fetch master list (official) ----
          # Reference: iptv-org README documents index.m3u
          curl -fsSL "https://iptv-org.github.io/iptv/index.m3u" -o "$work/full.m3u"

          # ---- Fetch category lists (C1 set) ----
          # These paths are documented/publicly mirrored under /categories/*.m3u
          # Order below defines priority if a URL appears in multiple categories.
          cats=(news sports movies kids music entertainment religious)

          > "$work/urlmap.tsv"
          for c in "${cats[@]}"; do
            curl -fsSL "https://iptv-org.github.io/iptv/categories/${c}.m3u" -o "$work/${c}.m3u" || echo "#EXTM3U" > "$work/${c}.m3u"
            # Append URL→Category pairs (TitleCase the category label here)
            awk -v CAT="$c" '
              function tcase(s,   a,i,out,w){ gsub(/[_-]/," ",s); split(s,a,/ +/); for(i=1;i<=length(a);i++){w=a[i]; if(w!="") out=(out?out" ":"") toupper(substr(w,1,1)) tolower(substr(w,2))} return out }
              !/^#/ && /^https?:/ { print $0 "\t" tcase(CAT) }
            ' "$work/${c}.m3u" >> "$work/urlmap.tsv"
          done

          # ---- Build a unique map (first category wins based on cats[] order above) ----
          awk -F'\t' '!seen[$1]++' "$work/urlmap.tsv" > "$work/urlmap_first.tsv"

          # ---- Generate mega.m3u with group-title=<Category> ----
          echo "#EXTM3U" > mega.m3u

          awk -v MAP="$work/urlmap_first.tsv" '
            function trim(s){ gsub(/^[ \t\r\n]+|[ \t\r\n]+$/,"",s); return s }
            BEGIN{
              FS="\n"; RS="\r?\n#EXTINF"; ORS=""
              # Load URL→Category
              while ((getline line < MAP) > 0) {
                split(line, p, /\t/); url=p[1]; cat=p[2]
                if (url != "" && cat != "") url2cat[url]=cat
              }
              close(MAP)
              print ""  # reset ORS (avoid leading null)
            }
            NR==1 { next }  # skip any header chunk prior to first EXTINF

            {
              # Reconstruct the EXTINF+URL pair
              ext = "#EXTINF" $0
              n = split(ext, lines, /\r?\n/)
              if (n < 2) next
              extline = lines[1]
              url = ""
              # Find the first non-comment line after EXTINF to use as URL
              for (i=2; i<=n; i++) { if (lines[i] !~ /^#/) { url = trim(lines[i]); break } }
              if (url == "") next

              cat = url2cat[url]
              if (cat == "" ) cat = "General"

              # Extract channel name
              name = extline; sub(/^.*,/, "", name)

              # Part before channel name
              before = extline; sub(/,.*$/, "", before)
              if (before ~ /group-title="/) {
                gsub(/group-title="[^"]*"/, "group-title=\"" cat "\"", before)
                newext = before "," name
              } else {
                newext = before " group-title=\"" cat "\"," name
              }

              print newext "\n" url "\n"
            }
          ' "$work/full.m3u" >> mega.m3u

          # Clean up
          rm -rf "$work"

      # 3) Commit & push using PAT (safe rebase avoids non-fast-forward)
      - name: Commit & push
        env:
          TOKEN:  ${{ secrets.PAT_TOKEN }}
          REPO:   ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config --global user.name  "AutoBot"
          git config --global user.email "bot@example.com"

          git add mega.m3u
          git commit -m "Auto: mega.m3u grouped by Category (URL membership from category playlists)" || echo "No changes"

          git remote set-url origin "https://sarfaraj74-Tech:${TOKEN}@github.com/${REPO}.git"
          git fetch origin
          git pull --rebase origin "${BRANCH}" || true
          git push origin HEAD:"${BRANCH}"
