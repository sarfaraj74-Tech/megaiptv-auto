name: Auto-Build Mega Playlist (Category-Guaranteed)

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout (no bot token persisted)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # 2) Build mega.m3u by explicit category assignment (C1 set) + General fallback
      - name: Build Mega Playlist
        run: |
          set -euo pipefail

          work=tmp_build
          rm -rf "$work" || true
          mkdir -p "$work"

          # ---- Master list (official) ----
          # iptv-org documents index.m3u as the all-channels master. (Ref in README)
          curl -fsSL "https://iptv-org.github.io/iptv/index.m3u" -o "$work/index.m3u"

          # ---- Category lists (C1) ----
          # iptv-org publishes categories under /categories/*.m3u. (Ref in public mirrors/docs)
          cats=(news sports movies kids music entertainment religious)

          # Lower->Title label mapper
          title_case() {
            local s="$1"; s="${s//_/ }"; s="${s//-/ }"
            # Title-case each word:
            awk -v S="$s" 'BEGIN{
              n=split(S,a," "); out="";
              for(i=1;i<=n;i++){ w=a[i]; if(w!=""){ w=toupper(substr(w,1,1)) tolower(substr(w,2)); out=(out?out" ":"") w } }
              print out
            }'
          }

          echo "#EXTM3U" > mega.m3u
          : > "$work/seen_urls.txt"

          write_pairs_with_category() {
            local src="$1" cat_label="$2"
            # Read EXTINF + first non-comment URL; force group-title="<Category>"
            awk -v CAT="$cat_label" '
              function trim(s){ gsub(/^[ \t\r\n]+|[ \t\r\n]+$/,"",s); return s }
              /^#EXTINF/ {
                ext=$0
                name=ext
                sub(/^.*,/, "", name)            # channel name
                before=ext; sub(/,.*$/, "", before)
                # replace or inject group-title
                if (before ~ /group-title="/) {
                  gsub(/group-title="[^"]*"/, "group-title=\"" CAT "\"", before)
                  newext = before "," name
                } else {
                  newext = before " group-title=\"" CAT "\"," name
                }
                # fetch URL (first non-comment line)
                url=""
                while (getline line) {
                  if (line ~ /^#/) continue
                  url=trim(line); break
                }
                if (url != "") {
                  print newext "\n" url
                }
              }
            ' "$src"
          }

          # 2a) Add all channels from each official category list, mark URLs as used
          for c in "${cats[@]}"; do
            label="$(title_case "$c")"
            curl -fsSL "https://iptv-org.github.io/iptv/categories/${c}.m3u" -o "$work/${c}.m3u" || echo "#EXTM3U" > "$work/${c}.m3u"
            write_pairs_with_category "$work/${c}.m3u" "$label" | \
            awk -v S="$work/seen_urls.txt" '
              function seen(u){ return (u in m) }
              BEGIN{
                while((getline u < S)>0){ m[u]=1 }
                close(S)
              }
              /^#EXTINF/ { ext=$0; getline url; if(!(url in m)){ print ext; print url; print url >> S; m[url]=1 } }
            ' >> mega.m3u
          done

          # 2b) Append remaining channels from index.m3u as General
          write_pairs_with_category "$work/index.m3u" "General" | \
          awk -v S="$work/seen_urls.txt" '
            BEGIN{
              while((getline u < S)>0){ m[u]=1 }
              close(S)
            }
            /^#EXTINF/ { ext=$0; getline url; if(!(url in m)){ print ext; print url; m[url]=1 } }
          ' >> mega.m3u

          rm -rf "$work"

      # 3) Commit & push using PAT (safe rebase to avoid non-fast-forward)
      - name: Commit & push
        env:
          TOKEN:  ${{ secrets.PAT_TOKEN }}
          REPO:   ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config --global user.name  "AutoBot"
          git config --global user.email "bot@example.com"

          git add mega.m3u
          git commit -m "Auto: mega.m3u grouped by category (explicit mapping + General fallback)" || echo "No changes"

          git remote set-url origin "https://sarfaraj74-Tech:${TOKEN}@github.com/${REPO}.git"
          git fetch origin
          git pull --rebase origin "${BRANCH}" || true
          git push origin HEAD:"${BRANCH}"
