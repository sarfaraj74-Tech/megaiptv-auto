name: Auto-Build Mega Playlist (Language - Category)

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout without persisting the default token
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      # 2) Build mega.m3u with group-title="<Language> - <Category>"
      - name: Build Mega Playlist
        run: |
          set -euo pipefail

          # Fetch full global index with metadata (tvg-language, group-title, etc.)
          curl -fsSL "https://iptv-org.github.io/iptv/index.m3u" -o full.m3u

          # Write header
          echo "#EXTM3U" > mega.m3u

          # Transform each EXTINF so group-title becomes "<Language> - <Category>"
          # - Language from tvg-language (fallback: Unknown)
          # - Category from original group-title (fallback: General)
          # - Title-case both
          # - Preserve all other attributes (tvg-id, tvg-logo, tvg-language, etc.) and channel name
          awk '
            function trim(s) { gsub(/^[ \t\r\n]+|[ \t\r\n]+$/,"",s); return s }
            function title(s,   a,i,out,w) {
              s=trim(s); if (s=="") return s
              split(s,a,/[ _-]+/)
              out=""
              for(i=1;i<=length(a);i++){
                w=a[i]; if (w=="") continue
                out = out (out==""?"":" ") toupper(substr(w,1,1)) tolower(substr(w,2))
              }
              return out
            }
            /^#EXTINF/ {
              ext=$0
              name=ext
              # Extract channel name (text after last comma)
              sub(/^.*,/, "", name)
              # Extract tvg-language (may be empty or multi-valued)
              lang=""
              if (match(ext, /tvg-language="([^"]*)"/, m)) { lang = m[1] }
              # Use first token if multiple (split on , ; /)
              split(lang, lp, /[,;\/]/); lang = trim(lp[1])
              if (lang == "") lang = "Unknown"

              # Extract original category from group-title
              cat=""
              if (match(ext, /group-title="([^"]*)"/, m2)) { cat = m2[1] }
              if (cat == "") cat = "General"

              # Clean formatting (Title Case both)
              lang = title(lang)
              cat  = title(cat)

              # Build new group
              newgrp = lang " - " cat

              # Rebuild the EXTINF line with new group-title while preserving other attributes
              before = ext
              sub(/,.*$/, "", before)          # part before channel name
              # If a group-title exists, replace it; otherwise, insert it before the comma
              if (before ~ /group-title="/) {
                gsub(/group-title="[^"]*"/, "group-title=\"" newgrp "\"", before)
                newext = before "," name
              } else {
                newext = before " group-title=\"" newgrp "\"," name
              }

              # Next line is the URL (print pair)
              getline url
              print newext >> "mega.m3u"
              print url    >> "mega.m3u"
            }
          ' full.m3u

          rm -f full.m3u

      # 3) Commit & push using PAT (safe rebase to avoid non-fast-forward)
      - name: Commit & push
        env:
          TOKEN:  ${{ secrets.PAT_TOKEN }}
          REPO:   ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config --global user.name  "AutoBot"
          git config --global user.email "bot@example.com"

          git add mega.m3u
          git commit -m "Auto: mega.m3u with group-title=<Language> - <Category>" || echo "No changes"

          git remote set-url origin "https://sarfaraj74-Tech:${TOKEN}@github.com/${REPO}.git"
          git fetch origin
          git pull --rebase origin "${BRANCH}" || true
          git push origin HEAD:"${BRANCH}"
