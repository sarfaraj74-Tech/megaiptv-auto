name: Auto-Build Super Mega IPTV Playlist (Categorized Minimal)

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Build categorized playlists (countries + per-country languages + categories + mega)
        run: |
          set -euo pipefail

          # Fresh dirs
          rm -rf countries categories tmp_lang || true
          mkdir -p countries categories tmp_lang

          # Start mega
          echo "#EXTM3U" > mega.m3u

          # ------------------------
          # Country map (root files)
          # ------------------------
          declare -A COUNTRY_CODE=(
            [india]=in
            [bangladesh]=bd
            [pakistan]=pk
            [usa]=us
            [uk]=gb
            [spain]=es
          )

          # ------------------------
          # Language map (for subfolders)
          # ------------------------
          declare -A LANG_CODE=(
            [english]=eng
            [hindi]=hin
            [bengali]=ben
            [urdu]=urd
          )

          # ------------------------
          # 1) Download country root files and append to mega
          # ------------------------
          for country in "${!COUNTRY_CODE[@]}"; do
            ccode="${COUNTRY_CODE[$country]}"
            echo "#EXTM3U" > "countries/${country}.m3u"
            curl -fsSL "https://iptv-org.github.io/iptv/countries/${ccode}.m3u" >> "countries/${country}.m3u" || true
            # Append to mega
            cat "countries/${country}.m3u" >> mega.m3u
          done

          # ------------------------
          # 2) Download language lists once (to tmp_lang)
          # ------------------------
          for lang in "${!LANG_CODE[@]}"; do
            lcode="${LANG_CODE[$lang]}"
            curl -fsSL "https://iptv-org.github.io/iptv/languages/${lcode}.m3u" -o "tmp_lang/${lang}.m3u" || echo "#EXTM3U" > "tmp_lang/${lang}.m3u"
          done

          # Helper: intersect a country root M3U and a language M3U by URL
          # Writes a header + only those (#EXTINF + URL) pairs whose URL is present in the country's list.
          intersect_country_language() {
            local country_file="$1"    # countries/india.m3u
            local language_file="$2"   # tmp_lang/english.m3u
            local out_file="$3"        # countries/india/english.m3u

            echo "#EXTM3U" > "$out_file"

            # Build a set of URLs present in the country file
            awk '!/^#/{print}' "$country_file" | sort -u > tmp_lang/urls_country.txt

            # Walk the language file as EXTINF + URL pairs; emit only if URL in set
            awk -v U=tmp_lang/urls_country.txt '
              BEGIN{
                while ((getline u < U) > 0) url[u]=1
                close(U)
              }
              /^#EXTINF/ { ext=$0; getline link; if (link ~ /^https?:\/\//) { if (url[link]) { print ext; print link } } }
            ' "$language_file" >> "$out_file"

            rm -f tmp_lang/urls_country.txt
          }

          # ------------------------
          # 3) Per-country language subfolders (India, Bangladesh, Pakistan)
          # ------------------------
          for country in india bangladesh pakistan; do
            mkdir -p "countries/${country}"
            for lang in english hindi bengali urdu; do
              intersect_country_language "countries/${country}.m3u" "tmp_lang/${lang}.m3u" "countries/${country}/${lang}.m3u"
            done
          done

          # ------------------------
          # 4) Categories (append each to mega)
          # ------------------------
          for cat in sports movies kids music news; do
            echo "#EXTM3U" > "categories/${cat}.m3u"
            curl -fsSL "https://iptv-org.github.io/iptv/categories/${cat}.m3u" >> "categories/${cat}.m3u" || true
            cat "categories/${cat}.m3u" >> mega.m3u
          done

          # ------------------------
          # 5) Global master (append last)
          # ------------------------
          curl -fsSL "https://iptv-org.github.io/iptv/index.m3u" >> mega.m3u || true

          # Cleanup temporary folder
          rm -rf tmp_lang || true

      - name: Commit & push (using PAT)
        env:
          TOKEN:  ${{ secrets.PAT_TOKEN }}
          REPO:   ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config --global user.name  "AutoBot"
          git config --global user.email "bot@example.com"

          git add .
          git commit -m "Build categorized playlists: mega + categories + country roots + per-country language folders" || echo "No changes"

          git remote set-url origin "https://sarfaraj74-Tech:${TOKEN}@github.com/${REPO}.git"
          git fetch origin
          git pull --rebase origin "${BRANCH}" || true
          git push origin HEAD:"${BRANCH}"
