name: Auto-Build Super Mega IPTV Playlist (Minimal)

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Build simple playlists
        run: |
          set -euo pipefail
          mkdir -p countries languages categories

          # Start fresh
          echo "#EXTM3U" > mega.m3u

          # ------------------------
          # Countries
          # ------------------------
          declare -A C=(
            [india]=in
            [bangladesh]=bd
            [pakistan]=pk
            [usa]=us
            [uk]=gb
            [spain]=es
          )
          for k in "${!C[@]}"; do
            echo "#EXTM3U" > "countries/${k}.m3u"
            curl -fsSL "https://iptv-org.github.io/iptv/countries/${C[$k]}.m3u" >> "countries/${k}.m3u" || true
            cat "countries/${k}.m3u" >> mega.m3u
          done

          # ------------------------
          # Languages
          # ------------------------
          declare -A L=(
            [english]=eng
            [hindi]=hin
            [bengali]=ben
            [urdu]=urd
          )
          for k in "${!L[@]}"; do
            echo "#EXTM3U" > "languages/${k}.m3u"
            curl -fsSL "https://iptv-org.github.io/iptv/languages/${L[$k]}.m3u" >> "languages/${k}.m3u" || true
            cat "languages/${k}.m3u" >> mega.m3u
          done

          # ------------------------
          # Categories
          # ------------------------
          for k in sports movies kids music news; do
            echo "#EXTM3U" > "categories/${k}.m3u"
            curl -fsSL "https://iptv-org.github.io/iptv/categories/${k}.m3u" >> "categories/${k}.m3u" || true
            cat "categories/${k}.m3u" >> mega.m3u
          done

          # ------------------------
          # Global master (append last)
          # ------------------------
          curl -fsSL "https://iptv-org.github.io/iptv/index.m3u" >> mega.m3u || true

      - name: Commit & push (using PAT)
        env:
          TOKEN: ${{ secrets.PAT_TOKEN }}
          REPO:  ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          git config --global user.name  "AutoBot"
          git config --global user.email "bot@example.com"

          git add .
          git commit -m "Minimal auto-update: mega + country/language/category" || echo "No changes"

          git remote set-url origin "https://sarfaraj74-Tech:${TOKEN}@github.com/${REPO}.git"
          git fetch origin
          git pull --rebase origin "${BRANCH}" || true
          git push origin HEAD:"${BRANCH}"
